<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradients -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bb3f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b041;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58d68d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effects -->
    <radialGradient id="blueGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="orangeGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0" />
    </radialGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4a90e2" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Decorative glowing orbs -->
  <circle cx="200" cy="100" r="150" fill="url(#blueGlow)"/>
  <circle cx="1000" cy="300" r="120" fill="url(#orangeGlow)"/>
  <circle cx="600" cy="200" r="100" fill="url(#blueGlow)" opacity="0.5"/>
  
  <!-- Hexagon pattern (inspired by logo) -->
  <g transform="translate(150, 200)" opacity="0.15">
    <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40" 
             fill="none" stroke="#4a90e2" stroke-width="3" filter="url(#glow)"/>
    <polygon points="0,-60 51.96,-30 51.96,30 0,60 -51.96,30 -51.96,-30" 
             fill="none" stroke="#4a90e2" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Code bracket symbol -->
  <g transform="translate(100, 120)">
    <!-- Left bracket -->
    <path d="M 40 20 L 20 60 L 40 100" fill="none" stroke="url(#blueGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- Slash -->
    <line x1="60" y1="40" x2="80" y2="80" stroke="url(#greenGradient)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Right circle -->
    <circle cx="110" cy="60" r="25" fill="none" stroke="url(#orangeGradient)" stroke-width="8" filter="url(#glow)"/>
  </g>
  
  <!-- Circuit lines -->
  <g opacity="0.2" stroke-width="2" fill="none">
    <path d="M 0 150 L 80 150 L 100 170 L 250 170" stroke="#4a90e2"/>
    <path d="M 0 250 L 60 250 L 80 230 L 250 230" stroke="#f39c12"/>
    <path d="M 950 150 L 1100 150 L 1120 170 L 1200 170" stroke="#4a90e2"/>
    <path d="M 950 250 L 1080 250 L 1100 270 L 1200 270" stroke="#2ecc71"/>
  </g>
  
  <!-- Circuit dots -->
  <g fill="#4a90e2">
    <circle cx="100" cy="170" r="4" filter="url(#glow)"/>
    <circle cx="80" cy="230" r="4" fill="#f39c12" filter="url(#glow)"/>
    <circle cx="1120" cy="170" r="4" filter="url(#glow)"/>
    <circle cx="1100" cy="270" r="4" fill="#2ecc71" filter="url(#glow)"/>
  </g>
  
  <!-- Title -->
  <text x="340" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" letter-spacing="-1">
    <tspan fill="#4a90e2" filter="url(#softGlow)">&lt;/</tspan><tspan fill="#f39c12" filter="url(#softGlow)">O</tspan><tspan fill="#ffffff">penCode API</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="340" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#2ecc71" filter="url(#glow)">
    Programmable AI Agent Platform
  </text>
  
  <!-- Description -->
  <text x="340" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">
    Build powerful AI-powered applications with session management,
  </text>
  <text x="340" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">
    SSE streaming events, and programmable AI agent control.
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(340, 330)">
    <!-- Feature 1: Session Management -->
    <rect x="0" y="0" width="36" height="36" rx="10" fill="rgba(74,144,226,0.15)" stroke="#4a90e2" stroke-width="1.5"/>
    <path d="M 12 18 L 24 18 M 18 12 L 18 24" stroke="#4a90e2" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <text x="48" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Session Management</text>
    
    <!-- Feature 2: SSE Streaming -->
    <rect x="230" y="0" width="36" height="36" rx="10" fill="rgba(243,156,18,0.15)" stroke="#f39c12" stroke-width="1.5"/>
    <path d="M 18 12 L 18 24 M 12 18 L 24 18" stroke="#f39c12" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <text x="278" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">SSE Streaming</text>
    
    <!-- Feature 3: AI Control -->
    <rect x="420" y="0" width="36" height="36" rx="10" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="5" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <path d="M 18 21 L 18 24 M 12 24 L 24 24" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
    <text x="468" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff">AI Control</text>
  </g>
  
  <!-- Decorative code snippet -->
  <g transform="translate(920, 120)" opacity="0.15">
    <rect x="0" y="0" width="240" height="140" rx="8" fill="rgba(74,144,226,0.1)" stroke="#4a90e2" stroke-width="1"/>
    <text x="20" y="30" font-family="Courier New, monospace" font-size="13" fill="#4a90e2">
      <tspan x="20" y="30">&lt;session&gt;</tspan>
      <tspan x="20" y="52">  id: "abc123"</tspan>
      <tspan x="20" y="74">  status: "active"</tspan>
      <tspan x="20" y="96">  events: [...]</tspan>
      <tspan x="20" y="118">&lt;/session&gt;</tspan>
    </text>
  </g>
  
  <!-- Accent line -->
  <line x1="340" y1="180" x2="680" y2="180" stroke="url(#blueGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
</svg>
