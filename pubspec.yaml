name: opencode_api
description: A Dart package that wraps the opencode.ai API using retrofit for type-safe HTTP requests.
version: 0.1.0
homepage: https://github.com/cdavis-code/opencode_api
repository: https://github.com/cdavis-code/opencode_api
issue_tracker: https://github.com/cdavis-code/opencode_api/issues
funding:
  - https://buymeacoffee.com/cdavis

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  retrofit: ^4.9.2
  dio: ^5.8.0
  json_annotation: ^4.11.0
  logger: ^2.7.0

dev_dependencies:
  retrofit_generator: ^10.0.1
  json_serializable: ^6.10.0
  build_runner: ^2.6.0
  test: ^1.25.0